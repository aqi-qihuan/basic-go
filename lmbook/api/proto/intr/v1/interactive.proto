syntax="proto3";

package intr.v1;
option go_package="intr/v1;intrv1";

service InteractiveService {
  rpc IncrReadCnt(IncrReadCntRequest) returns (IncrReadCntResponse);
  rpc Like(LikeRequest) returns (LikeResponse);
  // CancelLike 取消点赞
  rpc CancelLike(CancelLikeRequest) returns (CancelLikeResponse);
  // Collect 收藏
  rpc Collect(CollectRequest) returns (CollectResponse);
  // CancelCollect 取消收藏
  rpc CancelCollect(CancelCollectRequest) returns (CancelCollectResponse);
  // GetCollections 获取用户收藏列表
  rpc GetCollections(GetCollectionsRequest) returns (GetCollectionsResponse);
  rpc Get(GetRequest) returns (GetResponse);
  rpc GetByIds(GetByIdsRequest) returns (GetByIdsResponse);
}

message GetByIdsRequest {
  string biz = 1;
  repeated int64 ids = 2;
}

message GetByIdsResponse {
  map<int64, Interactive> intrs = 1;
}

message Interactive {
  string biz = 1;
  int64 biz_id = 2;
  int64 read_cnt = 3;
  int64 like_cnt = 4;
  int64 collect_cnt = 5;
  bool liked = 6;
  bool collected =7;
}

message GetResponse {
  Interactive intr =1;
}

message GetRequest {
  string biz = 1;
  int64 biz_id = 2;
  int64 uid = 3;
}

message CollectResponse {

}

message CollectRequest {
  string biz = 1;
  int64 biz_id = 2;
  int64 uid = 3;
  int64 cid = 4;
}

message CancelLikeResponse {

}

message CancelLikeRequest {
  string biz = 1;
  int64 biz_id = 2;
  int64 uid = 3;
}

message LikeRequest {
  string biz = 1;
  int64 biz_id = 2;
  int64 uid = 3;
}

message LikeResponse {

}

message IncrReadCntRequest {
  string biz = 1;
  int64 biz_id = 2;
}

message IncrReadCntResponse {

}

message CancelCollectRequest {
  string biz = 1;
  int64 biz_id = 2;
  int64 uid = 3;
}

message CancelCollectResponse {

}

message GetCollectionsRequest {
  int64 uid = 1;
  string biz = 2;
  int32 offset = 3;
  int32 limit = 4;
}

message GetCollectionsResponse {
  repeated CollectionItem items = 1;
  int64 total = 2;
}

message CollectionItem {
  int64 biz_id = 1;
  int64 ctime = 2;
}